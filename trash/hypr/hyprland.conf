# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1.60

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = hyprlauncher


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = kitty zsh -c "fastfetch; exec zsh"
exec-once = qs -c "noctalia-shell"
exec-once = fcitx5
exec-once = flclash
exec-once = rog-control-center
exec-once = wl-paste --watch cliphist store
exec-once = xrdb -merge ~/.Xresources
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
# exec-once = /home/kinntaku/user_dotfiles/bin/minimal.sh
#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = LANG,zh_CN.UTF-8
env = QT_QPA_PLATFORMTHEME,qt6ct   # 设置 QT 主题
env = AQ_DRM_DEVICES,/dev/dri/card1
env = __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/50_mesa.json
###################
### PERMISSIONS ###
###################

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 1
    gaps_out = 1

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = scrolling


}



# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    # rounding = 12
    # rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        # range = 4
        # render_power = 3
        # color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = false
        # size = 3
        # passes = 1

        # vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
# animations {
#     enabled = yes, please :)
# 
#     # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
#     #        NAME,           X0,   Y0,   X1,   Y1
#     bezier = easeOutQuint,   0.23, 1,    0.32, 1
#     bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
#     bezier = linear,         0,    0,    1,    1
#     bezier = almostLinear,   0.5,  0.5,  0.75, 1
#     bezier = quick,          0.15, 0,    0.1,  1
# 
#     # Default animations, see https://wiki.hypr.land/Configuring/Animations/
#     #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
#     animation = global,        1,     10,    default
#     animation = border,        1,     5.39,  easeOutQuint
#     animation = windows,       1,     4.79,  easeOutQuint
#     animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
#     animation = windowsOut,    1,     1.49,  linear,       popin 87%
#     animation = fadeIn,        1,     1.73,  almostLinear
#     animation = fadeOut,       1,     1.46,  almostLinear
#     animation = fade,          1,     3.03,  quick
#     animation = layers,        1,     3.81,  easeOutQuint
#     animation = layersIn,      1,     4,     easeOutQuint, fade
#     animation = layersOut,     1,     1.5,   linear,       fade
#     animation = fadeLayersIn,  1,     1.79,  almostLinear
#     animation = fadeLayersOut, 1,     1.39,  almostLinear
#     animation = workspaces,    1,     1.94,  almostLinear, fade
#     animation = workspacesIn,  1,     1.21,  almostLinear, fade
#     animation = workspacesOut, 1,     1.94,  almostLinear, fade
#     animation = zoomFactor,    1,     7,     quick
# }

animations {
    enabled = yes

    # 保持贝塞尔曲线定义
    bezier = quick, 0.2, 1, 0.2, 1 # 只保留快速曲线

    # 窗口动画
    animation = windows,    1, 2.5, quick
    # 禁用渐入渐出
    animation = fade,         0, 1, default
    # 工作区切换 (可保留 slide 或禁用)
    animation = workspaces, 1, 2.0, quick, slidevert

}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}
scrolling {
    fullscreen_on_one_column = false
    column_width=0.55
    explicit_column_widths = 0.55, 1.0
    focus_fit_method = 0
}
# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 2

    numlock_by_default = 1 # 开启小键盘锁定
    float_switch_override_focus = 0 # 更像 windows 的鼠标逻辑

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, vertical, workspace, r
gesture = 3, right, dispatcher, layoutmsg, move -col
gesture = 3, left, dispatcher, layoutmsg, move +col

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier



# Open Software
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = CONTROL SHIFT, Escape, exec, kitty htop
bind = ALT, SPACE, exec, kitty -e navi --path "$HOME/user_dotfiles/navi"


# Window config
bind = ALT,  F4, killactive,
bind = $mainMod, F, togglefloating,

bind = SUPER SHIFT, F, layoutmsg, colresize +conf
binde = SUPER, G, layoutmsg, colresize -0.1
binde = SUPER, H, layoutmsg, colresize +0.1
bind = SUPER ALT, F, fullscreen

# Layout and position
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

binde = $mainMod, D, layoutmsg, move +col
binde = $mainMod, A, layoutmsg, move -col
bind = $mainMod SHIFT, mouse_down, layoutmsg, move -col
bind = $mainMod SHIFT, mouse_up, layoutmsg, move +col
binde = $mainMod SHIFT, D, layoutmsg, swapcol r
binde = $mainMod SHIFT, A, layoutmsg, swapcol l

binde = $mainMod, W, workspace, r-1
binde = $mainMod, S, workspace, r+1
bind = $mainMod, mouse_down, workspace, r-1
bind = $mainMod, mouse_up, workspace, r+1
binde = $mainMod SHIFT, W, movetoworkspace, r-1
binde = $mainMod SHIFT, S, movetoworkspace, r+1

bind = $mainMod ALT, W, movefocus, u
bind = $mainMod ALT, S, movefocus, d

bind = $mainMod, Z, movewindow, l
bind = $mainMod SHIFT, Z, layoutmsg, promote

bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod SHIFT, M, movetoworkspace, special:magic

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = ALT, TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev



# Noctalia Shell
$ipc = qs -c noctalia-shell ipc call
# Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindel = , XF86AudioMute, exec, $ipc volume muteOutput
bindel = ,XF86AudioMicMute, exec, $ipc volume muteInput
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease
bindel = , XF86AudioNext, exec, $ipc media next
bindel = , XF86AudioPrev, exec, $ipc media previous
bindel = , XF86AudioPlay, exec, $ipc media playPause 

bind = , XF86Launch3, exec, rog-control-center
bind = , XF86Launch5, exec, $ipc powerProfile cycle
bind = $mainMod, grave, exec, $ipc launcher toggle
bind = $mainMod, V, exec, $ipc launcher clipboard
bind = $mainMod, N, exec, $ipc notifications toggleHistory
bind = $mainMod, L, exec, $ipc lockScreen lock
bind = $mainMod, X, exec, $ipc sessionMenu toggle
bind = $mainMod, I, exec, $ipc controlCenter toggle
bind = $mainMod ALT, E, exec, $ipc launcher emoji 
bind = $mainMod ALT, V, exec, $ipc volume togglePanel



# Screenshot
bind = $mainMod, Q, exec, hyprpicker -r -z & sleep 0.2 && grim -g "$(slurp)" - | wl-copy; pkill hyprpicker
bind = $mainMod SHIFT, Q, exec, wl-paste --type image/png | swappy -f -
bind = , Print, exec, grim - | wl-copy



##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule = no_anim on, float on, match:title ^wps$
windowrule = no_anim on, float on, match:title ^et$
windowrule = no_anim on, float on, match:title ^wpp$

# vscode美化
windowrule = opacity 0.95 override, match:class ^(code)$
windowrule = opacity 0.9 override, match:class ^(kitty)$

xwayland{
  force_zero_scaling=true
}



