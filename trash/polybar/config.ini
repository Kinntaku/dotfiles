[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
bottom = false
fixed-center = true
width = 100%
height = 24pt
radius = 0

dpi = 144

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace;2

modules-left = xworkspaces xwindow
modules-right = filesystem scratch backlight pulseaudio xkeyboard memory cpu wlan eth date systray powermode

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

override-redirect = false

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html



[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 5pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:20:...%

[module/backlight]
type = custom/script
# жҜҸз§’еҲ·ж–°дёҖж¬Ўдә®еәҰж•°еҖј
exec = brightnessctl -m | cut -d, -f4
interval = 0.5

format-prefix = "BRT "
format-prefix-foreground = ${colors.primary}

# йј ж Үж»ҡеҠЁи°ғиҠӮдә®еәҰ
scroll-up = brightnessctl set +5%
scroll-down = brightnessctl set 5%-

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/powermode]
type = custom/script
; дҪҝз”Ё case иҜӯеҸҘе°Ҷж–Үеӯ—иҪ¬жҚўдёәеӣҫж Ү
exec = case $(powerprofilesctl get) in performance) echo "PFM";; balanced) echo "BL";; power-saver) echo "PWS";; esac
interval = 1

; йўңиүІи®ҫзҪ®
format-foreground = ${colors.primary}
; зӮ№еҮ»еҲҮжҚўйҖ»иҫ‘дҝқжҢҒдёҚеҸҳ
click-left = bash -c 'current=$(powerprofilesctl get); if [ "$current" = "balanced" ]; then powerprofilesctl set performance; elif [ "$current" = "performance" ]; then powerprofilesctl set power-saver; else powerprofilesctl set balanced; fi'

label = %output%


[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

